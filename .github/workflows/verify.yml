name: Verify

on:
  workflow_call:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: pnpm/action-setup@v5

      - name: Node
        uses: actions/setup-node@v6

        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Format Check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint
